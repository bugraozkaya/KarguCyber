<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KarguCyber | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-mono p-6">

    <div class="max-w-6xl mx-auto"> 
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-red-500">🛡️ KarguCyber</h1>
                <p class="text-sm text-gray-400 mt-1">Aktif Savunma ve Bal Küpü İzleme İstasyonu</p>
            </div>
            <div class="text-right flex items-center space-x-4">
                <button onclick="toggleQuarantineVault()" class="bg-gray-800 hover:bg-red-900 text-green-400 border border-green-500 hover:border-red-500 px-4 py-2 rounded text-sm font-bold transition duration-300">
                    🐞 Karantina Kasası
                </button>

                <span class="bg-green-900 text-green-400 px-3 py-1 rounded text-sm animate-pulse">
                    ● Sistem Aktif
                </span>
            </div>
        </div>

        <div id="quarantine-vault" class="hidden mb-8 bg-black rounded-lg shadow-xl overflow-hidden border border-red-800">
            <div class="bg-red-950 p-3 border-b border-red-800 flex justify-between items-center">
                <h2 class="text-lg font-bold text-red-400">☣️ Hapsedilmiş Zararlı Yazılımlar</h2>
                <button onclick="toggleQuarantineVault()" class="text-gray-400 hover:text-white">❌ Kapat</button>
            </div>
            <div class="p-4 max-h-64 overflow-y-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-800">
                            <th class="pb-2">Dosya Adı</th>
                            <th class="pb-2">Kaynak IP</th>
                            <th class="pb-2 text-right">Dosya Boyutu</th>
                        </tr>
                    </thead>
                    <tbody id="quarantine-table-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-950 text-gray-400 text-sm">
                        <th class="p-4 border-b border-gray-700">Tarih / Saat</th>
                        <th class="p-4 border-b border-gray-700">Saldırgan IP</th>
                        <th class="p-4 border-b border-gray-700">Kullanıcı:Şifre</th>
                        <th class="p-4 border-b border-gray-700 text-purple-400">Tehdit Sınıfı</th>
                        <th class="p-4 border-b border-gray-700 text-yellow-400">Çalıştırılan Komut</th>
                        <th class="p-4 border-b border-gray-700 text-center">Aksiyon</th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                    <tr>
                        <td colspan="6" class="p-4 text-center text-gray-500">Loglar yükleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
